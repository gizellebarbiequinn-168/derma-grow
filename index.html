<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derma Grow | Personalized Routine</title>
    <style>
        /* CSS Variables & Global Styles */
        :root { --bg-main: #fcfbfa; --bg-card: #ffffff; --brand-primary: #4a5548; --brand-accent: #c49a45; --border-subtle: #e8e7e3; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-main); color: #2d312e; padding: 1rem; }
        
        .app-container { max-width: 800px; margin: 0 auto; }
        .hidden { display: none !important; }
        
        /* Navigation */
        .app-nav { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 20px; text-decoration: none; color: #606662; font-weight: 600; cursor: pointer; }
        .nav-link.active { background: var(--brand-primary); color: #fff; }
        
        /* Components */
        .content-card { background: var(--bg-card); padding: 1.5rem; border: 1px solid var(--border-subtle); border-radius: 12px; margin-bottom: 1rem; }
        .range-slider { width: 100%; margin: 1rem 0; accent-color: var(--brand-accent); }
    </style>
</head>
<body>

<div class="app-container">
    <nav class="app-nav" id="mainNav">
        <a class="nav-link active" data-target="dashboard">Dashboard</a>
        <a class="nav-link" data-target="quiz">Quiz</a>
    </nav>

    <!-- Dashboard -->
    <section id="dashboard" class="view-section">
        <div class="content-card">
            <h1>Budget Routine Builder</h1>
            <p>Monthly Budget: <span id="budgetValue">Rp 0</span></p>
            <input type="range" id="budgetSlider" class="range-slider" min="0" max="1000000" step="50000" value="0">
        </div>
    </section>

    <!-- Quiz -->
    <section id="quiz" class="view-section hidden">
        <div class="content-card">
            <h3>Personalized Quiz</h3>
            <p>Answer the steps to build your routine.</p>
        </div>
    </section>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Navigation Handler
        document.getElementById('mainNav').addEventListener('click', (e) => {
            if (!e.target.classList.contains('nav-link')) return;
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            
            e.target.classList.add('active');
            document.getElementById(e.target.dataset.target).classList.remove('hidden');
        });

        // Budget Slider
        const slider = document.getElementById('budgetSlider');
        slider.addEventListener('input', (e) => {
            document.getElementById('budgetValue').textContent = 
                `Rp ${parseInt(e.target.value).toLocaleString('id-ID')}`;
        });
    });
</script>
</body>
</html>
