<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derma Grow — Evidence-Based Budget Skincare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="brand-container">
                <span class="brand-heading">Derma Grow</span>
            </div>
            <nav class="app-nav">
                <a href="#" class="nav-link" data-target="dashboardSection">Dashboard</a>
                <a href="#" class="nav-link" data-target="quizSection">Personalized Quiz</a>
                <a href="#" class="nav-link" data-target="dictionarySection">Dictionary</a>
            </nav>
        </header>

        <main id="app-body">
            <section id="dashboardSection" class="view-section">
                <h1>Smart Skincare on a Strict Budget</h1>
                <div id="trackerCard"></div>
            </section>
            
            <section id="quizSection" class="view-section hidden">
                <h2>Build Your Confidence</h2>
                <div id="quizContainer"></div>
            </section>
            
            <section id="dictionarySection" class="view-section hidden">
                <h2>Skincare Dictionary</h2>
                <div id="dictionaryListContainer"></div>
            </section>
        </main>

        <footer class="app-footer">
            <p>&copy; 2026 Derma Grow. All rights reserved.</p>
            <p>Empowering skin confidence through science.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
